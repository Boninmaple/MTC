<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子质保书 (e-MTC) - 温州博江管件</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; padding: 10px; color: #333; }
        .header { text-align: center; border-bottom: 2px solid #003366; padding-bottom: 10px; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 18px; color: #003366; }
        .header p { margin: 3px 0; font-size: 10px; color: #666; }
        .table-container { width: 100%; overflow-x: auto; }
        .mtc-table { width: 100%; min-width: 900px; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        .mtc-table th, .mtc-table td { border: 1px solid #000; padding: 8px 4px; text-align: center; word-break: break-all; }
        .bg-gray { background: #f2f2f2; font-weight: bold; }
        .label-cn { display: block; font-size: 12px; margin-bottom: 2px;}
        .label-en { display: block; font-size: 9px; font-weight: normal; color: #666; text-transform: uppercase; }
        .footer { margin-top: 30px; text-align: center; font-size: 10px; color: #888; border-top: 1px dashed #ccc; padding-top: 10px; }
        .verify-tag { display: inline-block; border: 1px solid #2e7d32; color: #2e7d32; padding: 2px 8px; border-radius: 3px; margin-bottom: 10px; font-weight: bold; font-size: 12px;}
    </style>
</head>
<body>
    <div class="header">
        <h1>温州博江管件有限公司</h1>
        <p>Wenzhou Bojiang Pipe Fittings Co., Ltd.</p>
        <p>材质证明书 (Material Test Certificate)</p>
    </div>
    <div style="text-align: center;"><span class="verify-tag">✅ 官方数字化正品核验</span></div>
    <div class="table-container">
        <table class="mtc-table">
            <thead>
                <tr class="bg-gray">
                    <th style="width: 35px;">No.</th>
                    <th><span class="label-cn">产品名称</span><span class="label-en">Product</span></th>
                    <th><span class="label-cn">规格</span><span class="label-en">Spec</span></th>
                    <th><span class="label-cn">材质</span><span class="label-en">Material</span></th>
                    <th><span class="label-cn">执行标准</span><span class="label-en">Standard</span></th>
                    <th><span class="label-cn">材料炉号</span><span class="label-en">Heat No.</span></th>
                    <th><span class="label-cn">热处理批号</span><span class="label-en">Lot No.</span></th>
                    <th><span class="label-cn">冶炼方式</span><span class="label-en">Melting</span></th>
                    <th><span class="label-cn">交货状态</span><span class="label-en">Condition</span></th>
                    <th style="width: 50px;"><span class="label-cn">数量</span><span class="label-en">Qty</span></th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
    <div class="footer">
        Generated by Bojiang Official System. Equal effect to paper MTC.
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dataStr = urlParams.get('d');
        if (dataStr) {
            try {
                // ✨ 优化后的解码方式：先进行 URL 反向转义，再转二进制，最后按 UTF-8 解码
                const decodedData = decodeURIComponent(dataStr);
                const binary = atob(decodedData);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                const jsonStr = new TextDecoder().decode(bytes);
                const jsonData = JSON.parse(jsonStr);

                const tbody = document.getElementById('table-body');
                jsonData.forEach((item, index) => {
                    const row = `<tr><td>${index+1}</td><td><b>${item.p}</b></td><td>${item.s}</td><td>${item.m}</td><td>${item.st}</td><td>${item.h}</td><td>${item.l}</td><td>${item.ml}</td><td>${item.c}</td><td>${item.q}</td></tr>`;
                    tbody.innerHTML += row;
                });
            } catch (e) {
                console.error(e);
                document.body.innerHTML = "<h3 style='text-align:center;margin-top:50px;'>⚠️ 数据解析失败，请检查二维码是否完整</h3>";
            }
        }
    </script>
</body>
</html>
